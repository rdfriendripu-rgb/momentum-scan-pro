name: Daily momentum scan

on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run the paced universe scan
        working-directory: momentum-scan-pro
        env:
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/daily-scan.js
